name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run format:check

  validate-env-schema:
    name: Validate startup (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check that app.js parses without syntax errors
        run: node --check app.js

      - name: Check that all modules resolve
        run: node -e "try { require('./discord/helpers/bot'); require('./discord/helpers/models'); require('./discord/embeds/panel'); console.log('All modules resolve'); } catch(e) { console.error(e.message); process.exit(1); }"
